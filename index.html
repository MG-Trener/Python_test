<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Тестирование Python</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f3f5fa;
    margin:0;
    padding:20px;
}

.container{
    max-width:1100px;
    margin:auto;
}

h1{
    text-align:center;
    margin-bottom:20px;
}

#timer{
    position:sticky;
    top:10px;
    background:white;
    padding:15px;
    border-radius:10px;
    font-size:24px;
    font-weight:bold;
    text-align:center;
    margin-bottom:20px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
    z-index:100;
}

.question{
    background:white;
    padding:20px;
    border-radius:12px;
    margin-bottom:20px;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.question h3{
    margin-top:0;
    font-size:18px;
}

.answer{
    display:block;
    padding:10px;
    margin-bottom:8px;
    border-radius:8px;
    cursor:pointer;
    transition:0.2s;
}

.answer:hover{
    background:#eef3ff;
}

.correct{
    background:#d4edda !important;
    border:2px solid #28a745;
}

.wrong{
    background:#f8d7da !important;
    border:2px solid #dc3545;
}

button{
    display:block;
    margin:30px auto;
    padding:15px 30px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

#result{
    text-align:center;
    font-size:28px;
    font-weight:bold;
    margin-top:30px;
    margin-bottom:50px;
}

</style>
</head>

<body>

<div class="container">

<h1>Тестирование Python</h1>

<div id="timer">
    Осталось времени: 60:00
</div>

<form id="quiz"></form>

<button type="button" onclick="checkAnswers()">
    Завершить тест
</button>

<div id="result"></div>

</div>

<script>

const questions = [

{
q:"1. Скрипт мониторинга должен опрашивать датчик температуры каждые 5 минут в течение часа.",
a:[
"for t in range(0, 60, 1)",
"for t in range(1, 12, 1)",
"for t in range(60, 5, 0)",
"for t in range(0, 61, 5)"
],
c:3
},

{
q:"2. Результат использования круглых скобок в (x**2 for x in range(1000))",
a:[
"Создание tuple",
"Создание списка",
"Создание callback",
"Создание generator"
],
c:3
},

{
q:"3. Оператор для вычисления недостающих элементов",
a:[
"required | available",
"required & available",
"required - available",
"required ^ available"
],
c:2
},

{
q:"4. Причина ошибки после from math import *",
a:[
"math требует активации",
"Функции math имеют приоритет",
"Переполнение стека",
"Конфликт имен"
],
c:3
},

{
q:"5. Лучший способ очистки списка",
a:[
"data = 0",
"data.remove_all()",
"del data",
"data.clear()"
],
c:3
},

{
q:"6. Режим добавления текста в конец файла",
a:[
"'w'",
"'a'",
"'r'",
"'rb'"
],
c:1
},

{
q:"7. Тип коллекции для **kwargs",
a:[
"Dictionary",
"FrozenSet",
"List",
"Tuple"
],
c:0
},

{
q:"8. Правильный range() для четных индексов",
a:[
"range(0, N, 2)",
"range(N, 0, 2)",
"range(0, 2, N)",
"range(2, N, 0)"
],
c:0
},

{
q:"9. FIFO извлечение первого элемента",
a:[
"orders.pop(0)",
"orders.remove(0)",
"orders.clear()",
"del orders[-1]"
],
c:0
},

{
q:"10. Импорт только sqrt",
a:[
"import math.sqrt",
"import sqrt from math",
"using math.sqrt as sqrt",
"from math import sqrt"
],
c:3
}

];

// ===== РЕНДЕР =====

const quiz = document.getElementById("quiz");

questions.forEach((item,index)=>{

    const div = document.createElement("div");

    div.className = "question";

    let html = `<h3>${item.q}</h3>`;

    item.a.forEach((ans,i)=>{

        html += `
        <label class="answer" id="q${index}_${i}">
            <input type="radio" name="q${index}" value="${i}">
            ${ans}
        </label>
        `;

    });

    div.innerHTML = html;

    quiz.appendChild(div);

});

// ===== TIMER =====

let totalTime = 60 * 60;

const timerElement = document.getElementById("timer");

function updateTimer(){

    const minutes = Math.floor(totalTime / 60);
    const seconds = totalTime % 60;

    timerElement.innerHTML =
        `Осталось времени: ${String(minutes).padStart(2,'0')}:${String(seconds).padStart(2,'0')}`;

    if(totalTime <= 0){

        clearInterval(timerInterval);

        alert("Время вышло!");

        checkAnswers();
    }

    totalTime--;

}

updateTimer();

const timerInterval = setInterval(updateTimer,1000);

// ===== ПРОВЕРКА =====

function checkAnswers(){

    clearInterval(timerInterval);

    let score = 0;

    questions.forEach((item,index)=>{

        const selected =
            document.querySelector(`input[name=q${index}]:checked`);

        item.a.forEach((a,i)=>{

            document
                .getElementById(`q${index}_${i}`)
                .classList.remove("correct","wrong");

        });

        if(selected){

            const value = Number(selected.value);

            if(value === item.c){

                score++;

                document
                    .getElementById(`q${index}_${value}`)
                    .classList.add("correct");

            }else{

                document
                    .getElementById(`q${index}_${value}`)
                    .classList.add("wrong");

                document
                    .getElementById(`q${index}_${item.c}`)
                    .classList.add("correct");
            }

        }else{

            document
                .getElementById(`q${index}_${item.c}`)
                .classList.add("correct");
        }

    });

    const percent =
        ((score / questions.length) * 100).toFixed(1);

    document.getElementById("result").innerHTML =
        `
        Правильных ответов: ${score} / ${questions.length}
        <br><br>
        Процент правильных ответов: ${percent}%
        `;

    window.scrollTo({
        top: document.body.scrollHeight,
        behavior: "smooth"
    });

}

</script>

</body>
</html>
