<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Python Test Part 1</title>
<style>
body{font-family:Arial;background:#f3f5fa;padding:20px;margin:0}
.container{max-width:1100px;margin:auto}
.question{background:#fff;padding:20px;border-radius:12px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.answer{display:block;padding:10px;border-radius:8px;margin-bottom:8px;cursor:pointer}
.answer:hover{background:#eef3ff}
.correct{background:#d4edda!important;border:2px solid #28a745}
.wrong{background:#f8d7da!important;border:2px solid #dc3545}
button{padding:15px 30px;background:#2563eb;color:#fff;border:none;border-radius:10px;font-size:18px;cursor:pointer;display:block;margin:30px auto}
#result{text-align:center;font-size:28px;font-weight:bold;margin-top:30px}
#timer{position:sticky;top:10px;background:#fff;padding:15px;border-radius:10px;font-size:24px;font-weight:bold;text-align:center;margin-bottom:20px}
</style>
</head>
<body>
<div class="container">
<h1>Тестирование Python — Часть 1</h1>
<div id="timer">Осталось времени: 30:00</div>
<form id="quiz"></form>
<button type="button" onclick="checkAnswers()">Завершить тест</button>
<div id="result"></div>
</div>
<script>
const questions = [
{
q:`1. Скрипт мониторинга должен опрашивать датчик температуры каждые 5 минут в течение часа.`,
a:["for t in range(0, 60, 1)","for t in range(1, 12, 1)","for t in range(60, 5, 0)","for t in range(0, 61, 5)"],c:3},
{
q:`2. Разработчик выбирает между [x**2 for x in range(1000)] и (x**2 for x in range(1000)).`,
a:["Tuple","Const list","Callback","Generator"],c:3},
{
q:`3. Система складского учёта имеет множество необходимых товаров и товаров в наличии.`,
a:["required | available","required & available","required - available","required ^ available"],c:2},
{
q:`4. После from math import * программа начала выдавать неверные результаты.`,
a:["Активация","Приоритет","Переполнение","Конфликт имен"],c:3},
{
q:`5. Очистка списка данных перед новым циклом импорта.`,
a:["data=0","remove_all","del data","data.clear()"],c:3},
{
q:`6. Режим открытия файла для добавления данных.`,
a:["w","a","r","rb"],c:1},
{
q:`7. Тип коллекции для **kwargs.`,
a:["Dictionary","FrozenSet","List","Tuple"],c:0},
{
q:`8. Правильный range() для четных индексов.`,
a:["range(0,N,2)","range(N,0,2)","range(0,2,N)","range(2,N,0)"],c:0},
{
q:`9. FIFO извлечение первого элемента.`,
a:["orders.pop(0)","orders.remove(0)","orders.clear()","del orders[-1]"],c:0},
{
q:`10. Импорт только sqrt из math.`,
a:["import math.sqrt","import sqrt from math","using math.sqrt","from math import sqrt"],c:3},
{
q:`11. Нормализация email.`,
a:["email.strip().lower()","clear","replace","split"],c:0},
{
q:`12. Метод получения позиции курсора файла.`,
a:["seek","read","tell","write"],c:2},
{
q:`13. bonus_points внутри функции add_bonus.`,
a:["Глобальная","Локальная","Константа","Ресурс"],c:1},
{
q:`14. Почему генератор не работает повторно.`,
a:["Одна итерация","Сброс","Защита","ОС"],c:0},
{
q:`15. Рекурсивный шаг факториала.`,
a:["+","*","factorial(n)","/"],c:1},
{
q:`16. Индекс последнего символа строки.`,
a:["0","1","-1","-N"],c:2},
{
q:`17. Почему score=100 пропускается.`,
a:["Тип","elif","Нет =","Порядок"],c:2},
{
q:`18. Причина UnboundLocalError.`,
a:["Тип","Локальная x","Закрыты","Удалена"],c:1},
{
q:`19. Генерация ValueError вручную.`,
a:["break","pass","return","raise"],c:3},
{
q:`20. Получение 404 из строки.`,
a:["[6:10]","[6:9]","[7:9]","[6:8]"],c:1},
{
q:`21. Преимущество именованных аргументов.`,
a:["Ускорение","Явность","Память","Конвертация"],c:1},
{
q:`22. Почему token[1]='2' ошибка.`,
a:["Reserved","Индекс","Кавычки","Immutable"],c:3},
{
q:`23. Компактное создание списка.`,
a:["Generator","List Comprehension","Nested","Map"],c:1},
{
q:`24. Архитектура except.`,
a:["raise","Exception","many try","multiple except"],c:3},
{
q:`25. Применение декоратора.`,
a:["call logger","@logger","wrap","def logger"],c:1},
{
q:`26. Ошибка int('text').`,
a:["ZeroDivisionError","IndexError","ValueError","NameError"],c:2},
{
q:`27. Правильное имя переменной.`,
a:["2_database_id","database-id-val","database_id_2","global-id-item"],c:2},
{
q:`28. Цикл для ввода пароля.`,
a:["for","while","if","try"],c:1},
{
q:`29. Универсальный logger.`,
a:["*args","**kwargs","kwargs,name","args,name"],c:1},
{
q:`30. Порядок параметров функции.`,
a:["Сначала дефолт","Обязательные перед дефолтными","Любой","Середина"],c:1}
];

const quiz=document.getElementById('quiz');
questions.forEach((item,index)=>{
const div=document.createElement('div');
div.className='question';
let html=`<h3>${item.q}</h3>`;
item.a.forEach((ans,i)=>{
html+=`<label class='answer' id='q${index}_${i}'><input type='radio' name='q${index}' value='${i}'> ${ans}</label>`;
});
div.innerHTML=html;quiz.appendChild(div);
});

let totalTime=30*60;
const timer=document.getElementById('timer');
function updateTimer(){
const m=Math.floor(totalTime/60);
const s=totalTime%60;
timer.innerHTML=`Осталось времени: ${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
if(totalTime<=0){clearInterval(timerInterval);checkAnswers();}
totalTime--;}
updateTimer();
const timerInterval=setInterval(updateTimer,1000);

function checkAnswers(){
clearInterval(timerInterval);
let score=0;
questions.forEach((item,index)=>{
const selected=document.querySelector(`input[name=q${index}]:checked`);
item.a.forEach((a,i)=>document.getElementById(`q${index}_${i}`).classList.remove('correct','wrong'));
if(selected){
const value=Number(selected.value);
if(value===item.c){score++;document.getElementById(`q${index}_${value}`).classList.add('correct');}
else{
document.getElementById(`q${index}_${value}`).classList.add('wrong');
document.getElementById(`q${index}_${item.c}`).classList.add('correct');
}}
});
const percent=((score/questions.length)*100).toFixed(1);
document.getElementById('result').innerHTML=`Правильных ответов: ${score}/${questions.length}<br><br>${percent}%`;
}
</script>
</body>
</html>
